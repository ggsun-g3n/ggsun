    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --primary-orange: #FF6B00;
            --dark-accent: #431407;
            --soft-orange: #FFF4ED;
            --slate: #71717a;
            --border-color: #FDBA74;
            --gold: #FFB800;
            --glass: rgba(255, 255, 255, 0.9);
            --white: #FFFFFF;
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box;
            -webkit-user-select: none; 
            -ms-user-select: none; 
            user-select: none; 
            -webkit-tap-highlight-color: transparent; 
        }

        button, a {
            outline: none !important;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at top right, #FFFFFF, #FFEDD5);
            color: var(--dark-accent);
            min-height: 100vh;
            overflow-x: hidden;
            perspective: 1000px;
            scroll-behavior: smooth;
        }

        .notification {
            position: fixed;
            top: -120px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--white);
            color: var(--primary-orange);
            padding: 15px 25px;
            border-radius: 15px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.1);
            z-index: 1000;
            transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            gap: 15px;
            font-weight: 700;
            border: 1px solid rgba(255, 107, 0, 0.1);
            width: 90%;
            max-width: 350px;
            justify-content: center;
        }

        .notification.show {
            top: 20px;
        }

        nav {
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--glass);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 10px;
            z-index: 100;
            width: 94%;
            margin: 10px auto;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(255, 107, 0, 0.1);
            border: 1px solid rgba(255, 107, 0, 0.2);
        }

        .logo-text { font-weight: 800; font-size: 1.2rem; letter-spacing: -0.5px; }
        .logo-text span { color: var(--primary-orange); }

        .hero-container {
            max-width: 1200px;
            margin: 30px auto;
            padding: 40px 25px;
            display: flex;
            gap: 40px;
            align-items: center;
            background: var(--white);
            border-radius: 30px;
            box-shadow: 20px 20px 60px rgba(255, 107, 0, 0.05);
            transition: transform 0.5s ease;
            border: 1px solid #FFF7ED;
            width: 94%;
        }

        .hero-image {
            flex: 1;
            display: flex;
            justify-content: center;
            filter: drop-shadow(0 30px 50px rgba(255, 107, 0, 0.2));
        }

        .icon-box {
            width: 200px;
            height: 200px;
            background: linear-gradient(135deg, #FF6B00, #FFA500);
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 90px;
            color: white;
            font-weight: 800;
            position: relative;
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(-5deg); }
            50% { transform: translateY(-15px) rotate(5deg); }
        }

        .hero-content { flex: 1.2; width: 100%; }

        .ver-badge {
            background: var(--soft-orange);
            color: var(--primary-orange);
            padding: 6px 15px;
            border-radius: 100px;
            font-size: 0.75rem;
            font-weight: 700;
            margin-bottom: 10px;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            box-shadow: 0 4px 15px rgba(255, 107, 0, 0.05);
            border: 1px solid rgba(255, 107, 0, 0.1);
        }

        .ver-badge a {
            color: inherit;
            text-decoration: none;
        }

        h1 {
            font-size: 3.5rem;
            line-height: 1.1;
            margin-bottom: 10px;
            background: linear-gradient(to right, #FF6B00, #9A3412);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .dev-info { font-size: 0.9rem; margin-bottom: 20px; }

        .metrics {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin: 25px 0;
        }

        .metric-item {
            background: var(--white);
            padding: 15px 10px;
            border-radius: 15px;
            text-align: center;
            border: 1px solid #FFEDD5;
        }

        .metric-item b { display: block; font-size: 1.2rem; color: var(--primary-orange); }
        .metric-item span { color: var(--slate); font-size: 0.65rem; text-transform: uppercase; }

        .btn-row {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 25px;
        }

        .btn-main {
            background: var(--primary-orange);
            color: white;
            padding: 16px 30px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            border-bottom: 4px solid #C2410C;
            flex: 1;
            min-width: 200px;
            text-align: center;
        }

        .btn-trial {
            background: var(--primary-orange);
            color: white;
            padding: 16px 25px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            border-bottom: 4px solid #C2410C;
        }

        .star-group { display: flex; gap: 8px; margin-top: 12px; justify-content: flex-start; }

        .star-btn {
            width: 45px;
            height: 45px;
            border-radius: 10px;
            border: 1px solid #FFEDD5;
            background: white;
            font-weight: 700;
            color: var(--primary-orange);
            transition: 0.3s;
        }

        .star-btn.active {
            background: var(--primary-orange);
            color: white;
            border-color: var(--primary-orange);
        }

        footer {
            padding: 30px 20px;
            text-align: center;
            color: var(--slate);
            font-size: 0.8rem;
        }

        @media (max-width: 768px) {
            nav { width: 92%; padding: 12px 15px; }
            .hero-container { 
                flex-direction: column; 
                text-align: center; 
                padding: 35px 20px;
                margin-top: 20px;
            }
            .icon-box { width: 150px; height: 150px; font-size: 70px; }
            h1 { font-size: 2.8rem; }
            .btn-row { flex-direction: column; }
            .btn-main, .btn-trial { width: 100%; }
            .star-group { justify-content: center; }
            .ver-badge { font-size: 0.7rem; }
            .metrics { gap: 8px; }
            .metric-item b { font-size: 1rem; }
        }
    </style>
</head>
<body oncontextmenu="return false;"> 

<div id="notif" class="notification">
    <i class="fas fa-star"></i>
    <span id="notif-text">Rating saved!</span>
</div>

<nav>
    <div class="logo-text">g3n<span> - </span>Tozyer</div>
    <div style="font-size: 0.7rem; color: var(--primary-orange); font-weight: 800; text-transform: uppercase;">System Online</div>
</nav>

<div class="hero-container">
    <div class="hero-image">
        <div class="icon-box">T</div>
    </div>

    <div class="hero-content">
        <div class="badge-wrapper" style="display: flex; flex-wrap: wrap; gap: 8px; justify-content: center;">
            <div class="ver-badge">
                <i class="fas fa-history"></i>
                <a href="https://gg-sun.in/versions">Old Versions</a>
            </div>
        </div>
        
        <h1>Tozyer</h1>
        <p class="dev-info">By <b>Sunam Sarkar</b> • GGSUN Enterprise</p>

        <div class="metrics">
            <div class="metric-item">
                <b>4.0/5.0</b>
                <span>Rating</span>
            </div>
            <div class="metric-item">
                <b>49 MB</b>
                <span>Size</span>
            </div>
            <div class="metric-item">
                <b>1.0.1</b>
                <span>version</span>
            </div>
        </div>

        <div class="btn-action-area">
            <div class="btn-row">
                <a href="https://www.mediafire.com/file/cto0j9t48t0hdzr/Tozyer_1.0.1.apk/file?dkey=ynisvqys4gb&r=1831" class="btn-main">
                    <i class="fas fa-cloud-arrow-down"></i> DOWNLOAD APK
                </a>
                
                <a href="https://gg-sun.in/trial" class="btn-trial">
                    <i class="fas fa-bolt"></i> TRIAL
                </a>
            </div>

            <div class="rating-container" style="margin-top: 20px;">
                <span style="font-size: 0.7rem; font-weight: 800; color: var(--slate); letter-spacing: 1px;">RATE YOUR EXPERIENCE</span>
                <div class="star-group">
                    <button class="star-btn" data-val="1" onclick="setRating(1)">1</button>
                    <button class="star-btn" data-val="2" onclick="setRating(2)">2</button>
                    <button class="star-btn" data-val="3" onclick="setRating(3)">3</button>
                    <button class="star-btn" data-val="4" onclick="setRating(4)">4</button>
                    <button class="star-btn" data-val="5" onclick="setRating(5)">5</button>
                </div>
            </div>
        </div>
    </div>
</div>

<footer>
    <p>Copyright © 2025-2026 GGSUN<br>All rights reserved.</p>
</footer>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const savedRating = localStorage.getItem('userRating');
        if (savedRating) {
            highlightStars(savedRating);
        }
    });

    function setRating(n) {
        localStorage.setItem('userRating', n);
        highlightStars(n);

        const notif = document.getElementById('notif');
        const notifText = document.getElementById('notif-text');
        notifText.innerText = `Rated ${n} stars!`;
        notif.classList.add('show');
        
        setTimeout(() => {
            notif.classList.remove('show');
        }, 3000);
    }

    function highlightStars(n) {
        const stars = document.querySelectorAll('.star-btn');
        stars.forEach(star => {
            star.classList.remove('active');
            if (star.getAttribute('data-val') == n) {
                star.classList.add('active');
            }
        });
    }

    const card = document.querySelector('.hero-container');
    document.addEventListener('mousemove', (e) => {
        if(window.innerWidth > 900) {
            let xAxis = (window.innerWidth / 2 - e.pageX) / 25;
            let yAxis = (window.innerHeight / 2 - e.pageY) / 25;
            card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
        }
    });
</script>

</body>
</html>
